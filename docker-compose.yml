services:

  # ── Frontend (React + Nginx) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080"
    ports:
      - "3000:80"
    depends_on:
      - mangahub-api
    restart: unless-stopped

  # ── Redis Cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: "redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save 300 100 --save 60 1000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── API Server (HTTP + WebSocket) ────────────────────────────────
  mangahub-api:
    build: .
    command: api-server
    ports:
      - "8080:8080"
    volumes:
      - mangahub-data:/app/data
    environment:
      - PORT=8080
      - TCP_PORT=mangahub-tcp:9090
      - UDP_PORT=mangahub-udp:9091
      - GRPC_PORT=mangahub-grpc:9092
      - DB_PATH=/app/data/mangahub.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env or the environment}
      - GIN_MODE=release
      - LOG_FORMAT=json
      - ENABLE_TCP_SERVER=false
      - ENABLE_UDP_SERVER=false
      - ENABLE_GRPC_SERVER=false
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mangahub-tcp:
        condition: service_started
      mangahub-udp:
        condition: service_started
      mangahub-grpc:
        condition: service_started

  # ── TCP Progress Sync ────────────────────────────────────────────
  mangahub-tcp:
    build: .
    command: tcp-server
    ports:
      - "9090:9090"
    volumes:
      - mangahub-data:/app/data
    environment:
      - TCP_PORT=9090
      - DB_PATH=/app/data/mangahub.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env or the environment}
    restart: unless-stopped

  # ── UDP Notifications ────────────────────────────────────────────
  mangahub-udp:
    build: .
    command: udp-server
    ports:
      - "9091:9091/udp"
    volumes:
      - mangahub-data:/app/data
    environment:
      - UDP_PORT=9091
      - DB_PATH=/app/data/mangahub.db
    restart: unless-stopped

  # ── gRPC Service ─────────────────────────────────────────────────
  mangahub-grpc:
    build: .
    command: grpc-server
    ports:
      - "9092:9092"
    volumes:
      - mangahub-data:/app/data
    environment:
      - GRPC_PORT=9092
      - DB_PATH=/app/data/mangahub.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env or the environment}
    restart: unless-stopped

volumes:
  mangahub-data:
    driver: local
  redis-data:
    driver: local