syntax = "proto3";
package mangahub;
option go_package = "mangahub/internal/grpc/pb";

// MangaService provides gRPC access to the MangaHub manga database
// and user progress tracking system.
service MangaService {
    // Unary RPCs
    rpc GetManga(GetMangaRequest)         returns (MangaResponse);
    rpc SearchManga(SearchRequest)        returns (SearchResponse);
    rpc UpdateProgress(ProgressRequest)   returns (ProgressResponse);

    // Server-side streaming RPCs
    rpc StreamSearch(SearchRequest)             returns (stream MangaResponse);
    rpc WatchMangaUpdates(WatchRequest)         returns (stream MangaEvent);
}

// ── Existing messages ──────────────────────────────────────────

message GetMangaRequest {
    string manga_id = 1;
}

message MangaResponse {
    string id = 1;
    string title = 2;
    string author = 3;
    repeated string genres = 4;
    string status = 5;
    int32 total_chapters = 6;
    string description = 7;
}

message SearchRequest {
    string query = 1;
    string genre = 2;
    int32 limit = 3;
}

message SearchResponse {
    repeated MangaResponse results = 1;
    int32 total = 2;
}

message ProgressRequest {
    string user_id = 1;
    string manga_id = 2;
    int32 chapter = 3;
}

message ProgressResponse {
    bool success = 1;
    string message = 2;
}

// ── New streaming messages ─────────────────────────────────────

// WatchRequest subscribes to real-time manga events.
// Leave manga_id empty to receive events for all manga.
message WatchRequest {
    string manga_id = 1;
    string user_id  = 2;
}

// MangaEvent is a single real-time event pushed by WatchMangaUpdates.
message MangaEvent {
    string event_type = 1; // "connected","new_chapter","manga_updated","progress_updated"
    string manga_id   = 2;
    string user_id    = 3;
    string message    = 4;
    int64  timestamp  = 5;
    int32  chapter    = 6;
}
