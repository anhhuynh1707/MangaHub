name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # reads the exact version from go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build — api-server
        run: go build ./cmd/api-server/

      - name: Build — tcp-server
        run: go build ./cmd/tcp-server/

      - name: Build — udp-server
        run: go build ./cmd/udp-server/

      - name: Build — grpc-server
        run: go build ./cmd/grpc-server/

      - name: Build — cli
        run: go build ./cmd/cli/

      - name: Run tests (auth)
        run: go test -race -v -timeout 30s ./internal/auth/...

      - name: Run tests (tcp)
        run: go test -race -v -timeout 30s ./internal/tcp/...

      - name: Run tests (sanitize)
        run: go test -race -v -timeout 30s ./pkg/sanitize/...

      - name: Vet
        run: go vet ./...

  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-test   # only run if unit tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build

      - name: Start all services
        run: docker compose up -d

      - name: Wait for API health endpoint
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ API is up (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 3s..."
            sleep 3
          done
          echo "❌ API did not become healthy after 90 seconds"
          docker compose logs
          exit 1

      - name: Verify API returns valid JSON
        run: |
          response=$(curl -sf http://localhost:8080/health)
          echo "Health response: $response"
          echo "$response" | python3 -c "import sys, json; json.load(sys.stdin); print('✅ Valid JSON')"

      - name: Print service logs (always, for debugging)
        if: always()
        run: docker compose logs --tail=50

      - name: Stop and remove all services and volumes
        if: always()
        run: docker compose down -v

  publish:
    name: Publish to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: [docker]                          # only runs after smoke test passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write                        # required to push to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
